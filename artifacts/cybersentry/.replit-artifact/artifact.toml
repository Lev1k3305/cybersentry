kind = "web"
previewPath = "/cybersentry/"
title = "CyberSentry"
version = "1.0.0"
id = "artifacts/cybersentry"
router = "path"

[[services]]
name = "web"
paths = [ "/cybersentry/" ]
localPort = 18849

[services.development]
run = "pnpm --filter @workspace/cybersentry run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cybersentry", "run", "build" ]
serve = "static"
publicDir = "artifacts/cybersentry/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18849"
BASE_PATH = "/cybersentry/"
